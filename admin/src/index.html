<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomWorks CRM — Admin Access</title>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            black: '#0A0A0C',
                            surface: '#121217',
                            border: '#23232F',
                            orange: '#FF5E36',
                            muted: '#A1A1AA',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0A0A0C;
            font-family: 'Inter', sans-serif;
        }
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 94, 54, 0.08) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .glass {
            background: rgba(18, 18, 23, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(35, 35, 47, 0.7);
        }
    </style>
</head>
<body class="min-h-screen text-zinc-100 flex items-center justify-center relative overflow-hidden px-4">
    <!-- Ambient glows -->
    <div class="glow -top-40 -left-40"></div>
    <div class="glow -bottom-40 -right-40"></div>

    <div class="w-full max-w-[440px] z-10">
        <!-- Brand Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter uppercase inline-flex items-center gap-2">
                Custom<span class="text-brand-orange">Works</span>
            </h1>
            <p class="text-xs text-brand-muted uppercase tracking-widest mt-1 font-semibold">Pro Operations Console</p>
        </div>

        <!-- Login Card -->
        <div class="glass rounded-2xl p-8 shadow-2xl relative overflow-hidden transition-all duration-300 hover:border-brand-orange/20">
            <!-- Orange top accent border -->
            <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-transparent via-brand-orange to-transparent"></div>
            
            <h2 class="text-xl font-bold tracking-tight text-white mb-2">Admin Authentication</h2>
            <p class="text-xs text-brand-muted mb-6">Enter credentials to establish secure administrator session.</p>

            <!-- Error Banner -->
            <div id="errorBanner" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-semibold rounded-xl p-4 mb-5 flex items-center gap-2.5 animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-alert-circle"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12" y1="16" y2="16.01"/></svg>
                <span id="errorMessage">Invalid system credentials.</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="username" class="block text-[11px] font-black uppercase tracking-wider text-brand-muted mb-2">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        required 
                        placeholder="e.g. mohit"
                        class="w-full bg-[#181822] border border-brand-border rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-brand-orange/50 transition-colors"
                    >
                </div>

                <div>
                    <label for="password" class="block text-[11px] font-black uppercase tracking-wider text-brand-muted mb-2">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        required 
                        placeholder="••••••••"
                        class="w-full bg-[#181822] border border-brand-border rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-brand-orange/50 transition-colors"
                    >
                </div>

                <div class="pt-2">
                    <button 
                        type="submit" 
                        id="submitBtn"
                        class="w-full bg-brand-orange hover:bg-[#ff704d] text-white font-bold text-xs uppercase tracking-widest py-3.5 px-4 rounded-xl shadow-lg shadow-brand-orange/10 hover:shadow-brand-orange/20 transition-all duration-300 flex items-center justify-center gap-2"
                    >
                        <span>Initiate Session</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right"><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-[10px] text-zinc-600 mt-6 font-semibold tracking-wider uppercase">
            SECURE ACCESS ONLY &copy; 2026 CUSTOMWORKS CO.
        </p>
    </div>

    <script>
        const API_URL = 'http://localhost:4000/api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorBanner = document.getElementById('errorBanner');
            const errorMessage = document.getElementById('errorMessage');
            
            // Set loading state
            submitBtn.disabled = true;
            submitBtn.innerText = 'Authenticating...';
            errorBanner.classList.add('hidden');
            
            try {
                const response = await fetch(`${API_URL}/auth/admin-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Authentication failed');
                }
                
                // Store JWT in localStorage
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminUser', data.username);
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
                
            } catch (err) {
                errorMessage.innerText = err.message;
                errorBanner.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Initiate Session</span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right"><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
            }
        });
    </script>
</body>
</html>
